# Grafana 数据源自动配置（启动即生效）
apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    uid: influxdb-1
    access: proxy
    url: http://influxdb:8086
    database: factory_monitoring
    user: ${INFLUXDB_USER:-admin}
    secureJsonData:
      password: ${INFLUXDB_PASSWORD:-admin123}
    jsonData:
      httpMode: GET
    isDefault: true
    editable: false