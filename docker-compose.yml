version: "3.8"

services:
  influxdb:
    image: influxdb:1.8-alpine
    container_name: industrial-influxdb
    restart: unless-stopped
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
      - ./influxdb/init.iql:/docker-entrypoint-initdb.d/init.iql:ro
    environment:
      - INFLUXDB_DB=factory_monitoring
      - INFLUXDB_ADMIN_USER=${INFLUXDB_USER:-admin}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_PASSWORD:-admin123}
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: industrial-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    depends_on:
      - influxdb
    networks:
      - monitoring

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: industrial-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  influxdb_data:
  grafana_data:
  mosquitto_data: